<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slide Library</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f9f9f9;
            color: #1a1a1a;
            font-size: 13px;
        }

        .header {
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 14px 16px 10px;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .header p {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .search-bar {
            padding: 10px 16px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
        }

        .search-bar input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            background: #fafafa;
        }

        .search-bar input:focus {
            border-color: #0078d4;
            background: #fff;
        }

        .filters {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
        }

        .filter-btn {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            color: #555;
        }

        .filter-btn.active {
            background: #0078d4;
            color: #fff;
            border-color: #0078d4;
        }

        .slide-list {
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slide-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slide-icon {
            width: 40px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .slide-info {
            flex: 1;
        }

        .slide-title {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .slide-tag {
            font-size: 10px;
            color: #888;
        }

        .insert-btn {
            padding: 5px 10px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .insert-btn:hover {
            background: #006cbd;
        }

        .empty {
            text-align: center;
            color: #aaa;
            font-size: 12px;
            padding: 30px 0;
        }

        .toast {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #323130;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            z-index: 100;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Библиотека слайдов</h1>
        <p>Найдите и вставьте необходимый слайд</p>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Поиск по названию или тегу..." oninput="renderSlides()" />
    </div>

    <div class="filters" id="filters"></div>

    <div class="slide-list" id="slideList"></div>

    <div class="toast" id="toast">Слайд вставлен</div>

    <script src="taskpane.js"></script>
</body>

</html>
