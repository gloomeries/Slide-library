<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Библиотека слайдов</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      font-size: 13px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 14px 16px 10px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .search-wrap {
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      background: #fafafa;
    }

    .search-wrap input:focus {
      border-color: #0078d4;
      background: #fff;
    }

    .search-icon {
      position: absolute;
      left: 26px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      opacity: 0.4;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
    }

    .category-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #e0e0e0;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
    }

    .category-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    border-color: #0078d4;
    }

    .category-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .category-card .label {
      padding: 7px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }

    .catalog { display: none; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      cursor: pointer;
      font-size: 12px;
      color: #0078d4;
      font-weight: 500;
    }

    .back-btn:hover { background: #f0f0f0; }

    .catalog-title {
      padding: 10px 16px 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .slide-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .slide-card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .slide-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .slide-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .slide-card .slide-label {
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 90%;
      max-width: 320px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .modal-info {
      padding: 12px 14px;
    }

    .modal-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-insert {
      flex: 1;
      padding: 8px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-insert:hover { background: #006cbd; }

    .btn-close {
      flex: 1;
      padding: 8px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-close:hover { background: #e0e0e0; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      padding: 30px 0;
    }

    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #323130;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      z-index: 200;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Библиотека слайдов</h1>
    <p>Найдите и вставьте нужный слайд</p>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6.5" cy="6.5" r="5" stroke="#000" stroke-width="1.5"/>
      <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Поиск по категории..." oninput="handleSearch()" />
  </div>

  <div id="mainScreen">
    <div class="grid" id="categoryGrid"></div>
  </div>

  <!-- Экран каталога категории -->
  <div id="catalogScreen" class="catalog">
    <div class="back-btn" onclick="goBack()"> Назад</div>
    <div class="catalog-title" id="catalogTitle"></div>
    <div class="slide-grid" id="slideGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <img id="modalImg" src="data:," alt="" />
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-buttons">
          <button class="btn-insert" onclick="insertSlide()">Вставить</button>
          <button class="btn-close" onclick="closeModal()">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Слайд вставлен</div>

  <script src="taskpane.js"></script>
</body>
</html>
